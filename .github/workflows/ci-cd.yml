name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 安装依赖
        run: |
          pip install ruff mypy
          pip install -r requirements.txt 2>/dev/null || true

      - name: Ruff 格式检查
        run: ruff format --check .

      - name: Ruff Lint
        run: ruff check .

      - name: MyPy 类型检查
        run: mypy --ignore-missing-imports --no-error-summary api/ agent/ security/ || true

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agent_platform_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 安装依赖
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: 运行测试
        env:
          ENVIRONMENT: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: agent_platform_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/ -v --tb=short --cov=api --cov=agent --cov=security \
            --cov-report=xml --cov-report=term-missing || true

      - name: 上传覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 安装安全扫描工具
        run: pip install bandit safety

      - name: Bandit 安全扫描
        run: bandit -r api/ agent/ security/ -f json -o bandit-report.json || true

      - name: Safety 依赖检查
        run: safety check -r requirements.txt || true

      - name: 上传安全报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.CONTAINER_REGISTRY }}/multi-agent-platform:${{ github.sha }}
            ${{ secrets.CONTAINER_REGISTRY }}/multi-agent-platform:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: 部署到预发布环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: 部署到预发布环境
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ secrets.CONTAINER_REGISTRY }}/multi-agent-platform:${{ github.sha }}"

  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 部署到生产环境
        run: |
          echo "Deploying to production environment..."
          echo "Image: ${{ secrets.CONTAINER_REGISTRY }}/multi-agent-platform:${{ github.sha }}"
