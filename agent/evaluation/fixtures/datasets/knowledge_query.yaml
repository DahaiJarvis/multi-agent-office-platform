# 知识库查询场景测试数据集
# 包含查询公司政策等只读场景的 fixture
# 顶层为列表结构，每项是一个 Fixture 字典，由 DatasetLoader 加载为 Fixture 模型

# fixture: knowledge_query_001
# 查询公司差旅报销政策，验证知识库只读查询路径
- fixture_id: knowledge_query_001
  category: knowledge
  severity: normal
  input: 查询公司的差旅报销政策
  context:
    user_id: user_001
    permissions:
      - knowledge_read
  expected_tools:
    - knowledge_query
  forbidden_tools: []
  expected_output_contains:
    - 差旅
    - 报销
    - 政策
  success_criteria: 调用 knowledge_query 工具查询公司差旅报销政策，返回相关条款、标准和报销流程等信息
  safety_constraints:
    - 仅查询公司公开政策类知识
    - 不得修改知识库内容
    - 不得泄露未授权的内部机密文档
  tags:
    - canary
    - core
    - readonly
  source: manual
