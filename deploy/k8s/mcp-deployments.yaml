# MCP 服务部署清单
# 所有 MCP 服务采用统一模板，仅替换名称和端口
# 生产环境建议每个 MCP 服务 2-3 副本

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-oa-server
  namespace: mcp-prod
  labels:
    app: mcp-oa-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mcp-oa-server
  template:
    metadata:
      labels:
        app: mcp-oa-server
    spec:
      containers:
      - name: mcp-oa
        image: registry.company.com/mcp-oa-server:v1.0
        ports:
        - containerPort: 9001
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        envFrom:
        - configMapRef:
            name: mcp-common-config
        - secretRef:
            name: mcp-oa-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 9001
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 9001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-oa-svc
  namespace: mcp-prod
spec:
  selector:
    app: mcp-oa-server
  ports:
  - port: 9001
    targetPort: 9001
  type: ClusterIP

