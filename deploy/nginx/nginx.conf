# 多Agent办公平台 Nginx 反向代理配置
#
# 路由规则：
# - /api/*       -> agent-api (FastAPI 主服务，含知识库代理路由)
# - /ida/sse     -> ida_service (IDA SSE 端点，MCP 客户端直连)
# - /health      -> agent-api 健康检查
# - /metrics     -> agent-api Prometheus 指标

upstream agent_api {
    server agent-api:8000;
}

upstream ida_service {
    server ida:9100;
}

server {
    listen 80;
    server_name _;

    # 请求体大小限制（支持大文件上传）
    client_max_body_size 50m;

    # 通用超时配置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;

    # API 路由（含知识库代理路由 /api/v1/knowledge/*）
    # 知识库请求经平台认证网关处理后转发到 IDA，无需单独配置 location
    location /api/ {
        proxy_pass http://agent_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持：禁用缓冲，保持长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # IDA SSE 端点（MCP 客户端直连 IDA）
    # 此路径不经过平台认证网关，由 IDA 自身的 MCPAuthMiddleware 验证 API Key
    location /ida/sse {
        proxy_pass http://ida_service/sse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 长连接支持：超时设为 24 小时
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://agent_api/api/v1/admin/health;
    }

    # Prometheus 指标端点
    location /metrics {
        proxy_pass http://agent_api/metrics;
    }
}
