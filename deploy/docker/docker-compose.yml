version: "3.8"

services:
  # ==================== 基础设施 ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    # 使用含 pgvector 扩展的 PostgreSQL 16 镜像（spec 02 第 9.4 节）
    # 替代原 postgres:16-alpine，为 user_knowledge 向量检索提供 pgvector 支持
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==================== 可观测性 ====================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # ==================== 应用服务 ====================
  # MCP 注册中心
  mcp-registry:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9099:9099"
    environment:
      - MCP_REGISTRY_HOST=0.0.0.0
      - MCP_REGISTRY_PORT=9099
    command: ["python", "-m", "mcp_servers.registry"]

  # OA 审批 MCP 服务
  mcp-oa:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9001:9001"
    environment:
      - OA_API_URL=${OA_API_URL:-http://host.docker.internal:3001/api}
      - OA_API_TOKEN=${OA_API_TOKEN}
    command: ["python", "-m", "mcp_servers.oa_server.server"]
    depends_on:
      - mcp-registry

  # 邮件 MCP 服务
  mcp-email:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9002:9002"
    environment:
      - EMAIL_API_URL=${EMAIL_API_URL:-http://host.docker.internal:3002/api}
      - EMAIL_API_TOKEN=${EMAIL_API_TOKEN}
    command: ["python", "-m", "mcp_servers.email_server.server"]
    depends_on:
      - mcp-registry

  # 日历 MCP 服务
  mcp-calendar:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9003:9003"
    environment:
      - CALENDAR_API_URL=${CALENDAR_API_URL:-http://host.docker.internal:3003/api}
      - CALENDAR_API_TOKEN=${CALENDAR_API_TOKEN}
    command: ["python", "-m", "mcp_servers.calendar_server.server"]
    depends_on:
      - mcp-registry

  # CRM MCP 服务
  mcp-crm:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9004:9004"
    environment:
      - CRM_API_URL=${CRM_API_URL:-http://host.docker.internal:3004/api}
      - CRM_API_TOKEN=${CRM_API_TOKEN}
    command: ["python", "-m", "mcp_servers.crm_server.server"]
    depends_on:
      - mcp-registry

  # IM 消息 MCP 服务
  mcp-im:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9006:9006"
    environment:
      - IM_API_URL=${IM_API_URL:-http://host.docker.internal:3006/api}
      - IM_API_TOKEN=${IM_API_TOKEN}
    command: ["python", "-m", "mcp_servers.im_server.server"]
    depends_on:
      - mcp-registry

  # 文档 MCP 服务
  mcp-doc:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9007:9007"
    environment:
      - DOC_API_URL=${DOC_API_URL:-http://host.docker.internal:3007/api}
      - DOC_API_TOKEN=${DOC_API_TOKEN}
    command: ["python", "-m", "mcp_servers.doc_server.server"]
    depends_on:
      - mcp-registry

  # HR 人事 MCP 服务
  mcp-hr:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9008:9008"
    environment:
      - HR_API_URL=${HR_API_URL:-http://host.docker.internal:3008/api}
      - HR_API_TOKEN=${HR_API_TOKEN}
    command: ["python", "-m", "mcp_servers.hr_server.server"]
    depends_on:
      - mcp-registry

  # 财务 MCP 服务
  mcp-finance:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9009:9009"
    environment:
      - FINANCE_API_URL=${FINANCE_API_URL:-http://host.docker.internal:3009/api}
      - FINANCE_API_TOKEN=${FINANCE_API_TOKEN}
    command: ["python", "-m", "mcp_servers.finance_server.server"]
    depends_on:
      - mcp-registry

  # 知识库 MCP 服务
  mcp-knowledge:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9010:9010"
    environment:
      - KNOWLEDGE_API_URL=${KNOWLEDGE_API_URL:-http://host.docker.internal:3010/api}
      - KNOWLEDGE_API_TOKEN=${KNOWLEDGE_API_TOKEN}
    command: ["python", "-m", "mcp_servers.knowledge_server.server"]
    depends_on:
      - mcp-registry

  # 网络搜索 MCP 服务
  mcp-web-search:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9011:9011"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - WEB_SEARCH_MODEL=${WEB_SEARCH_MODEL:-qwen-turbo}
    command: ["python", "-m", "mcp_servers.web_search_server.server"]
    depends_on:
      - mcp-registry

  # 智能文档助手 (IDA)
  ida:
    image: ${IDA_IMAGE:-ida:latest}
    ports:
      - "9100:9100"
    environment:
      - IDA_HOST=0.0.0.0
      - IDA_PORT=9100
      - IDA_LLM_PROVIDER=${IDA_LLM_PROVIDER:-dashscope}
      - IDA_LLM_MODEL=${IDA_LLM_MODEL:-qwen-plus}
      - IDA_LLM_API_KEY=${IDA_LLM_API_KEY:-${DASHSCOPE_API_KEY}}
      - IDA_LLM_BASE_URL=${IDA_LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - IDA_EMBEDDING_MODEL=${IDA_EMBEDDING_MODEL:-text-embedding-v3}
      - IDA_VECTOR_STORE=${IDA_VECTOR_STORE:-pgvector}
      - IDA_DB_HOST=postgres
      - IDA_DB_PORT=5432
      - IDA_DB_NAME=ida
      - IDA_DB_USER=postgres
      - IDA_DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - IDA_SSE_API_KEY=${IDA_SSE_API_KEY}
      - IDA_JWT_PUBLIC_KEY=${IDA_JWT_PUBLIC_KEY}
    volumes:
      - ida_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  # Agent API 主服务
  agent-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=agent_platform
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # SSO 配置
      - SSO_ENABLED=${SSO_ENABLED:-false}
      - SSO_ENTRA_ID_ENABLED=${SSO_ENTRA_ID_ENABLED:-false}
      - SSO_ENTRA_ID_CLIENT_ID=${SSO_ENTRA_ID_CLIENT_ID:-}
      - SSO_ENTRA_ID_CLIENT_SECRET=${SSO_ENTRA_ID_CLIENT_SECRET:-}
      - SSO_ENTRA_ID_TENANT_ID=${SSO_ENTRA_ID_TENANT_ID:-common}
      - SSO_OKTA_ENABLED=${SSO_OKTA_ENABLED:-false}
      - SSO_OKTA_CLIENT_ID=${SSO_OKTA_CLIENT_ID:-}
      - SSO_OKTA_CLIENT_SECRET=${SSO_OKTA_CLIENT_SECRET:-}
      - SSO_OKTA_DOMAIN=${SSO_OKTA_DOMAIN:-}
      - SSO_WECOM_ENABLED=${SSO_WECOM_ENABLED:-false}
      - SSO_WECOM_CORP_ID=${SSO_WECOM_CORP_ID:-}
      - SSO_WECOM_AGENT_ID=${SSO_WECOM_AGENT_ID:-}
      - SSO_WECOM_SECRET=${SSO_WECOM_SECRET:-}
      - SSO_DINGTALK_ENABLED=${SSO_DINGTALK_ENABLED:-false}
      - SSO_DINGTALK_CLIENT_ID=${SSO_DINGTALK_CLIENT_ID:-}
      - SSO_DINGTALK_CLIENT_SECRET=${SSO_DINGTALK_CLIENT_SECRET:-}
      # 加密配置
      - ENCRYPTION_ENABLED=${ENCRYPTION_ENABLED:-true}
      - ENCRYPTION_KEY_PROVIDER=${ENCRYPTION_KEY_PROVIDER:-env}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY:-}
      # 数据驻留
      - DATA_RESIDENCY_REGION=${DATA_RESIDENCY_REGION:-cn-north}
      - DATA_RESIDENCY_ENFORCED=${DATA_RESIDENCY_ENFORCED:-true}
      # 多租户
      - MULTI_TENANT_ENABLED=${MULTI_TENANT_ENABLED:-false}
      - TENANT_DEFAULT_ISOLATION=${TENANT_DEFAULT_ISOLATION:-row}
      - TENANT_DEFAULT_REGION=${TENANT_DEFAULT_REGION:-cn-north}
      # IDA 智能文档助手集成
      - IDA_BACKEND_URL=${IDA_BACKEND_URL:-http://ida:9100}
      - IDA_SSE_API_KEY=${IDA_SSE_API_KEY}
      - IDA_MCP_SSE_URL=${IDA_MCP_SSE_URL:-http://ida:9100/sse}
      - PLATFORM_JWT_PRIVATE_KEY=${PLATFORM_JWT_PRIVATE_KEY}
      - PLATFORM_JWT_AUDIENCE=${PLATFORM_JWT_AUDIENCE:-multi-agent-platform}
      - PLATFORM_JWT_ISSUER=${PLATFORM_JWT_ISSUER:-multi-agent-platform}
    volumes:
      - encryption_keys:/app/instance
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  pg_data:
  grafana_data:
  prometheus_data:
  encryption_keys:
  ida_data:
