version: "3.8"

services:
  # ==================== 基础设施 ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==================== 可观测性 ====================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # ==================== 应用服务 ====================
  # MCP 注册中心
  mcp-registry:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9099:9099"
    environment:
      - MCP_REGISTRY_HOST=0.0.0.0
      - MCP_REGISTRY_PORT=9099
    command: ["python", "-m", "mcp_servers.registry"]

  # OA 审批 MCP 服务
  mcp-oa:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9001:9001"
    environment:
      - OA_API_URL=${OA_API_URL:-http://host.docker.internal:3001/api}
      - OA_API_TOKEN=${OA_API_TOKEN}
    command: ["python", "-m", "mcp_servers.oa_server.server"]
    depends_on:
      - mcp-registry

  # 邮件 MCP 服务
  mcp-email:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9002:9002"
    environment:
      - EMAIL_API_URL=${EMAIL_API_URL:-http://host.docker.internal:3002/api}
      - EMAIL_API_TOKEN=${EMAIL_API_TOKEN}
    command: ["python", "-m", "mcp_servers.email_server.server"]
    depends_on:
      - mcp-registry

  # 日历 MCP 服务
  mcp-calendar:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9003:9003"
    environment:
      - CALENDAR_API_URL=${CALENDAR_API_URL:-http://host.docker.internal:3003/api}
      - CALENDAR_API_TOKEN=${CALENDAR_API_TOKEN}
    command: ["python", "-m", "mcp_servers.calendar_server.server"]
    depends_on:
      - mcp-registry

  # CRM MCP 服务
  mcp-crm:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.mcp
    ports:
      - "9004:9004"
    environment:
      - CRM_API_URL=${CRM_API_URL:-http://host.docker.internal:3004/api}
      - CRM_API_TOKEN=${CRM_API_TOKEN}
    command: ["python", "-m", "mcp_servers.crm_server.server"]
    depends_on:
      - mcp-registry

  # Agent API 主服务
  agent-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=agent_platform
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - ENVIRONMENT=development
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  pg_data:
  grafana_data:
  prometheus_data:
