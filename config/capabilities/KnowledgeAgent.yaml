agent_name: KnowledgeAgent
description: "知识库检索专家"
version: "1.0.0"
category: domain

supported_intents:
  - knowledge_query
  - document_parse
  - document_summary
  - document_compare
  - report_generate
  - kb_manage

supported_actions:
  - search
  - qa
  - summarize
  - parse
  - compare
  - generate_report

capability_keywords:
  - "知识库"
  - "文档"
  - "搜索"
  - "问答"
  - "摘要"
  - "解析"
  - "对比"
  - "报告"
  - "网络搜索"
  - "图片分析"

limitations:
  - "不支持视频处理"
  - "不支持音频处理"
  - "不支持代码执行"

required_services:
  - knowledge

priority: 10
enabled: true

intent_configs:
  - intent: knowledge_query
    mode: direct
    review: false
  - intent: document_parse
    mode: direct
    review: false
  - intent: document_summary
    mode: direct
    review: false
  - intent: document_compare
    mode: direct
    review: false
  - intent: report_generate
    mode: selector
    review: true
  - intent: kb_manage
    mode: selector
    review: true
