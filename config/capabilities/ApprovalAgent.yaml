agent_name: ApprovalAgent
description: "企业审批处理专家"
version: "1.0.0"
category: domain

supported_intents:
  - approval_query
  - approval_action
  - approval_track

supported_actions:
  - query_list
  - approve
  - reject
  - transfer

capability_keywords:
  - "审批"
  - "待审批"
  - "OA"
  - "同意"
  - "拒绝"
  - "转审"
  - "审批单"

limitations:
  - "仅处理审批相关操作"
  - "不支持创建审批流程"

required_services:
  - oa
  - approval

security_constraints:
  - "仅处理本人权限范围内的审批"
  - "超过5000元需特别确认"

priority: 10
enabled: true

intent_configs:
  - intent: approval_query
    mode: direct
    review: false
  - intent: approval_action
    mode: selector
    review: true
  - intent: approval_track
    mode: direct
    review: false
