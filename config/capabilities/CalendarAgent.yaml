agent_name: CalendarAgent
description: "企业日程管理专家"
version: "1.0.0"
category: domain

supported_intents:
  - calendar_query
  - calendar_create
  - calendar_update
  - calendar_conflict

supported_actions:
  - query
  - create
  - update
  - cancel
  - conflict_check

capability_keywords:
  - "日程"
  - "会议"
  - "日历"
  - "预约"
  - "会议室"
  - "时间冲突"

limitations:
  - "不支持会议室资源管理"
  - "不支持跨组织日程共享"

required_services:
  - calendar

security_constraints:
  - "创建日程需确认参与者是否冲突"
  - "删除他人日程需特别确认"

priority: 10
enabled: true

intent_configs:
  - intent: calendar_query
    mode: direct
    review: false
  - intent: calendar_create
    mode: selector
    review: true
  - intent: calendar_update
    mode: selector
    review: true
  - intent: calendar_conflict
    mode: direct
    review: false
