agent_name: CRMAgent
description: "CRM 客户管理专家"
version: "1.0.0"
category: domain

supported_intents:
  - crm_query
  - crm_update
  - crm_analysis

supported_actions:
  - query_customer
  - update_customer
  - analyze

capability_keywords:
  - "客户"
  - "商机"
  - "CRM"
  - "销售"
  - "联系人"
  - "合同"

limitations:
  - "不支持客户数据导出"
  - "不支持批量数据修改"

required_services:
  - crm

priority: 10
enabled: true

intent_configs:
  - intent: crm_query
    mode: direct
    review: false
  - intent: crm_update
    mode: selector
    review: true
  - intent: crm_analysis
    mode: direct
    review: false
