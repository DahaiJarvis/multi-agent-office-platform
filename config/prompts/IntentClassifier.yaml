agent_name: IntentClassifier
description: "意图分类器，将用户消息分类到对应的意图标签"
version: "1.1.0"

intents:
  - name: approval_query
    label: "审批查询"
    description: "查看待审批、审批详情、审批进度"
  - name: approval_action
    label: "审批操作"
    description: "提交审批、同意/拒绝审批、撤回审批"
  - name: email_query
    label: "邮件查询"
    description: "查看邮件、搜索邮件、邮件摘要"
  - name: email_send
    label: "邮件发送"
    description: "发送邮件、回复邮件、转发邮件、起草邮件"
  - name: calendar_query
    label: "日程查询"
    description: "查看日程、会议安排、日程提醒"
  - name: calendar_create
    label: "日程创建"
    description: "创建会议、修改日程、取消会议"
  - name: crm_query
    label: "CRM查询"
    description: "客户信息、商机查询、销售数据"
  - name: hr_query
    label: "HR查询"
    description: "考勤、薪资查询、假期余额"
  - name: hr_action
    label: "HR操作"
    description: "请假申请、加班申请、离职申请"
  - name: finance_query
    label: "财务查询"
    description: "预算、报销查询、费用统计"
  - name: finance_action
    label: "财务操作"
    description: "提交报销、发票管理、付款申请"
  - name: knowledge_query
    label: "知识查询"
    description: "在知识库中搜索信息、查找文档、问答"
  - name: document_parse
    label: "文档解析"
    description: "解析PDF/Word等文件内容"
  - name: document_summary
    label: "文档摘要"
    description: "总结文档内容、提取要点"
  - name: document_compare
    label: "文档对比"
    description: "比较两份文档的异同"
  - name: report_generate
    label: "报告生成"
    description: "生成研究报告、分析报告、数据报告"
  - name: web_search
    label: "网络搜索"
    description: "搜索互联网获取实时信息，如天气、新闻、股价、汇率等实时数据"
  - name: image_analyze
    label: "图片分析"
    description: "分析图片内容、图片问答"
  - name: kb_manage
    label: "知识库管理"
    description: "创建知识库、上传文档、管理知识库"
  - name: cross_system
    label: "跨系统操作"
    description: "涉及多个系统的联动"
  - name: complex_task
    label: "复杂多步任务"
    description: "需要多个步骤或多个Agent协作完成"
  - name: general
    label: "通用办公"
    description: "简单的日常对话、问候、闲聊"

examples:
  - input: "北京明天天气怎么样"
    output: web_search
    reason: "天气是实时信息，需要网络搜索"
  - input: "帮我查一下今天的新闻"
    output: web_search
    reason: ""
  - input: "美元兑人民币汇率"
    output: web_search
    reason: ""
  - input: "帮我发一封邮件给张总"
    output: email_send
    reason: ""
  - input: "查看我的待审批列表"
    output: approval_query
    reason: ""
  - input: "帮我请一天假"
    output: hr_action
    reason: ""
  - input: "你好"
    output: general
    reason: ""
  - input: "帮我总结这份报告"
    output: document_summary
    reason: ""

content: |
  你是一个意图分类器。根据用户消息，输出意图分类结果。

  可选意图标签：
  {{ intents }}

  分类示例：
  {{ examples }}

  请严格按以下 JSON 格式输出，不要输出其他内容：
  {"intent": "意图标签", "confidence": 0.0-1.0, "sub_tasks": ["子任务1", "子任务2"]}
